# SonarCloud analysis scope (Automatic Analysis — the GitHub App binds the
# project key/organization; this file only SCOPES what each metric looks at).
#
# Why these duplication exclusions: SonarCloud's "duplicated lines on new code"
# gate (3% ceiling) is hostile to a small, content-growing game — every new boss
# legitimately mirrors the last one's shape, and a tiny PR's denominator makes the
# % explode, so you can extract forever and still hover near 3%. The genuinely
# shared plumbing already lives in helpers (core/animModel.js `loadAnimated`,
# entities/enemies.js `topUpMinions`). What remains is DELIBERATE parallelism:
#   - src/entities/bosses/**  each boss is a self-contained "card" (init/attacks/
#     spawns read top-to-bottom on purpose); cross-boss structural echo is a
#     readability choice, not a defect.
#   - src/config.js           the single-source data table (BOSS/WEAPONS/floors);
#     repeated stat-block shape is data, not duplicated logic.
#   - tests/**                tests legitimately repeat arrange/act/assert scaffolding.
# Duplication detection is the ONLY thing scoped out for these — bugs, security,
# smells, and complexity still apply everywhere.
sonar.cpd.exclusions=src/entities/bosses/**,src/config.js,tests/**

# Coverage gate shouldn't demand tests on data/config/tests/tooling.
sonar.coverage.exclusions=tests/**,scripts/**,src/config.js,**/*.config.*
