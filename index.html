<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>City of Monsters</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07060a;
        overflow: hidden;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        cursor: crosshair;
      }
      #app {
        position: fixed;
        inset: 0;
        display: block;
      }
      #app canvas {
        display: block;
      }

      /* ---- HUD overlay (DOM on top of the WebGL canvas) ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        color: #fff;
        text-shadow: 0 2px 6px #000;
        user-select: none;
      }
      #hearts {
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 28px;
        letter-spacing: 2px;
      }
      #lives {
        position: absolute;
        top: 52px;
        left: 18px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #ffd25a;
      }
      #hearts2 {
        position: absolute;
        top: 78px;
        left: 18px;
        font-size: 18px;
        letter-spacing: 1px;
        color: #6cff8a;
        display: none;
      }
      /* boss HP bars — 1 for a lone boss, 2 stacked for the dog/cat duo */
      #bossbars {
        position: absolute;
        top: 56px;
        left: 50%;
        transform: translateX(-50%);
        width: 56%;
        max-width: 620px;
        display: none;
        flex-direction: column;
        gap: 8px;
      }
      #bossbars.show {
        display: flex;
      }
      .bossbar.hidden {
        display: none;
      }
      .bossbar-name {
        text-align: center;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #ff8a8a;
        margin-bottom: 3px;
      }
      .bossbar-track {
        height: 14px;
        background: rgba(0, 0, 0, 0.55);
        border: 2px solid #ff4d4d;
        border-radius: 8px;
        overflow: hidden;
      }
      .bossbar-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff2a2a, #ff7a2a);
        transition: width 0.1s linear;
      }
      /* the 2nd bar (the cat) reads "cool" so the two roles are distinct */
      .bossbar[data-i='1'] .bossbar-track {
        border-color: #4db3ff;
      }
      .bossbar[data-i='1'] .bossbar-fill {
        background: linear-gradient(90deg, #2a8aff, #2ad0ff);
      }
      .bossbar[data-i='1'] .bossbar-name {
        color: #8ac8ff;
      }
      .bossbar.dead {
        opacity: 0.3;
      }
      .bossbar.dead .bossbar-fill {
        background: #555;
      }
      #room {
        position: absolute;
        top: 16px;
        right: 18px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        opacity: 0.85;
      }
      #banner {
        position: absolute;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 52px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #banner.show {
        opacity: 1;
      }
      #prompt {
        position: absolute;
        bottom: 20%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #prompt.show {
        opacity: 1;
      }
      #toast {
        position: absolute;
        bottom: 12%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #toast.show {
        opacity: 1;
      }

      /* blood splatter that fades over the whole screen */
      #splatter {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(150, 0, 0, 0.55) 0 3%, transparent 6%),
          radial-gradient(circle at 80% 60%, rgba(150, 0, 0, 0.55) 0 4%, transparent 7%),
          radial-gradient(circle at 60% 20%, rgba(120, 0, 0, 0.5) 0 2%, transparent 5%),
          radial-gradient(circle at 35% 80%, rgba(120, 0, 0, 0.5) 0 3%, transparent 6%);
        transition: opacity 0.4s ease;
      }

      /* loading splash shown until the game boots */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: radial-gradient(circle at 50% 40%, #2a0606 0%, #0a0508 70%, #07060a 100%);
        color: #ff5a4f;
        letter-spacing: 4px;
        font-weight: 800;
        text-transform: uppercase;
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      #boot.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot .title {
        font-size: 34px;
      }
      #boot .sub {
        font-size: 13px;
        color: #c9b8b8;
        letter-spacing: 2px;
      }
      .skull {
        font-size: 64px;
        animation: bob 1.1s ease-in-out infinite;
      }

      /* ---- start menu ---- */
      #startmenu {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        text-align: center;
        background: radial-gradient(circle at 50% 35%, #2a0606 0%, #0a0508 70%, #07060a 100%);
        color: #fff;
      }
      #startmenu.show {
        display: flex;
      }
      #startmenu h1 {
        margin: 0;
        font-size: 50px;
        letter-spacing: 4px;
        color: #ff5a4f;
        text-shadow: 0 3px 14px #000;
      }
      #startmenu button,
      #humanchoice button {
        cursor: pointer;
        width: 300px;
        padding: 16px 20px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        background: #2c2230;
        border: 2px solid #ff5a4f;
        border-radius: 12px;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }
      #startmenu button:hover,
      #humanchoice button:hover,
      #humanchoice button.focus {
        background: #4a2030;
        transform: scale(1.04);
        outline: 3px solid #ffd24a;
      }

      /* ---- human decision-boss choice overlay ---- */
      #humanchoice {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        text-align: center;
        pointer-events: auto;
        background: radial-gradient(circle at 50% 38%, #1a1410 0%, #0a0508 70%, #07060a 100%);
        color: #fff;
      }
      #humanchoice.show {
        display: flex;
      }
      #hc-setup {
        max-width: 640px;
        padding: 0 20px;
        font-size: 22px;
        line-height: 1.45;
        font-weight: 700;
        color: #ffeede;
        text-shadow: 0 2px 10px #000;
      }
      #humanchoice .hc-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        max-width: 740px;
      }
      #humanchoice button {
        width: 250px;
        font-size: 17px;
        letter-spacing: 1px;
        text-transform: none;
        border-color: #ffd24a;
      }
      #startmenu .hint {
        max-width: 440px;
        font-size: 14px;
        line-height: 1.5;
        color: #9a8a8a;
        letter-spacing: 1px;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-10px) scale(1.08);
        }
      }
      /* accessibility / feel settings panel (top-right, always reachable) */
      #settings {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(12, 8, 16, 0.55);
        border: 1px solid #3a2a40;
      }
      #settings button {
        background: #1a1320;
        color: #e8d8ff;
        border: 1px solid #4a3a52;
        border-radius: 8px;
        font-size: 16px;
        line-height: 1;
        padding: 5px 8px;
        cursor: pointer;
      }
      #settings button:hover {
        border-color: #b06cff;
      }
      #settings button.on {
        border-color: #6cff8a;
        color: #6cff8a;
      }
      #settings input[type='range'] {
        width: 80px;
        accent-color: #b06cff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="splatter"></div>

    <div id="hud">
      <div id="hearts"></div>
      <div id="lives"></div>
      <div id="hearts2"></div>
      <div id="room"></div>
      <div id="bossbars">
        <div class="bossbar" data-i="0">
          <div class="bossbar-name"></div>
          <div class="bossbar-track"><div class="bossbar-fill"></div></div>
        </div>
        <div class="bossbar" data-i="1">
          <div class="bossbar-name"></div>
          <div class="bossbar-track"><div class="bossbar-fill"></div></div>
        </div>
      </div>
      <div id="banner"></div>
      <div id="prompt"></div>
      <div id="toast"></div>
    </div>

    <div id="startmenu">
      <h1>🩸 City of Monsters</h1>
      <button id="btn1p">▶ 1 Player</button>
      <button id="btn2p">🎮 2 Players</button>
      <div class="hint">
        P1: WASD + mouse &nbsp;·&nbsp; P2: Xbox controller (left stick move, right stick aim, RT
        shoot) &nbsp;·&nbsp; click once for sound
      </div>
    </div>

    <!-- human decision-boss: A/B/C/D approach choice (text set from config in ui/humanchoice.js) -->
    <div id="humanchoice">
      <div id="hc-setup"></div>
      <div class="hc-row">
        <button id="hc-A"></button>
        <button id="hc-B"></button>
        <button id="hc-C"></button>
        <button id="hc-D"></button>
      </div>
      <div class="hint">
        Pick how you approach — you won't know if it was the right call until you choose.
        &nbsp;·&nbsp; 1-4 / click / left-stick + A
      </div>
    </div>

    <!-- accessibility / feel settings: volume, mute, hitbox overlay (persisted) -->
    <div id="settings">
      <button id="set-mute" title="Mute (M)" aria-label="Mute">🔊</button>
      <input id="set-vol" type="range" min="0" max="1" step="0.05" aria-label="Volume" />
      <button id="set-hit" title="Show hitboxes (H)" aria-label="Show hitboxes">⊙</button>
    </div>

    <div id="boot">
      <div class="skull">💀</div>
      <div class="title">City of Monsters</div>
      <div class="sub">loading&hellip;</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
