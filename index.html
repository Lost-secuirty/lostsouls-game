<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>City of Monsters</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07060a;
        overflow: hidden;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        cursor: crosshair;
      }
      #app {
        position: fixed;
        inset: 0;
        display: block;
      }
      #app canvas {
        display: block;
      }

      /* ---- HUD overlay (DOM on top of the WebGL canvas) ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        color: #fff;
        text-shadow: 0 2px 6px #000;
        user-select: none;
      }
      #hearts {
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 28px;
        letter-spacing: 2px;
      }
      #lives {
        position: absolute;
        top: 52px;
        left: 18px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #ffd25a;
      }
      #hearts2 {
        position: absolute;
        top: 78px;
        left: 18px;
        font-size: 18px;
        letter-spacing: 1px;
        color: #6cff8a;
        display: none;
      }
      /* boss HP bars — 1 for a lone boss, 2 stacked for the dog/cat duo */
      #bossbars {
        position: absolute;
        top: 56px;
        left: 50%;
        transform: translateX(-50%);
        width: 56%;
        max-width: 620px;
        display: none;
        flex-direction: column;
        gap: 8px;
      }
      #bossbars.show {
        display: flex;
      }
      .bossbar.hidden {
        display: none;
      }
      .bossbar-name {
        text-align: center;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #ff8a8a;
        margin-bottom: 3px;
      }
      .bossbar-track {
        height: 14px;
        background: rgba(0, 0, 0, 0.55);
        border: 2px solid #ff4d4d;
        border-radius: 8px;
        overflow: hidden;
      }
      .bossbar-fill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff2a2a, #ff7a2a);
        transition: width 0.1s linear;
      }
      /* the 2nd bar (the cat) reads "cool" so the two roles are distinct */
      .bossbar[data-i='1'] .bossbar-track {
        border-color: #4db3ff;
      }
      .bossbar[data-i='1'] .bossbar-fill {
        background: linear-gradient(90deg, #2a8aff, #2ad0ff);
      }
      .bossbar[data-i='1'] .bossbar-name {
        color: #8ac8ff;
      }
      .bossbar.dead {
        opacity: 0.3;
      }
      .bossbar.dead .bossbar-fill {
        background: #555;
      }
      #room {
        position: absolute;
        top: 16px;
        right: 18px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        opacity: 0.85;
      }
      #banner {
        position: absolute;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 52px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #banner.show {
        opacity: 1;
      }
      #prompt {
        position: absolute;
        bottom: 20%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #prompt.show {
        opacity: 1;
      }
      #toast {
        position: absolute;
        bottom: 12%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #toast.show {
        opacity: 1;
      }

      /* blood splatter that fades over the whole screen */
      #splatter {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(150, 0, 0, 0.55) 0 3%, transparent 6%),
          radial-gradient(circle at 80% 60%, rgba(150, 0, 0, 0.55) 0 4%, transparent 7%),
          radial-gradient(circle at 60% 20%, rgba(120, 0, 0, 0.5) 0 2%, transparent 5%),
          radial-gradient(circle at 35% 80%, rgba(120, 0, 0, 0.5) 0 3%, transparent 6%);
        transition: opacity 0.4s ease;
      }

      /* full-screen impact flash (feel) — color/opacity/fade set from JS (ui/hud.js).
         Sits under the HUD; skipped when reduced-effects is on. */
      #screenflash {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        background: #fff;
      }

      /* loading splash shown until the game boots */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: radial-gradient(circle at 50% 40%, #2a0606 0%, #0a0508 70%, #07060a 100%);
        color: #ff5a4f;
        letter-spacing: 4px;
        font-weight: 800;
        text-transform: uppercase;
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      #boot.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot .title {
        font-size: 34px;
      }
      #boot .sub {
        font-size: 13px;
        color: #c9b8b8;
        letter-spacing: 2px;
      }
      .skull {
        font-size: 64px;
        animation: bob 1.1s ease-in-out infinite;
      }

      /* ---- start menu ---- */
      #startmenu {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        text-align: center;
        background: radial-gradient(circle at 50% 35%, #2a0606 0%, #0a0508 70%, #07060a 100%);
        color: #fff;
      }
      #startmenu.show {
        display: flex;
      }
      #startmenu h1 {
        margin: 0;
        font-size: 50px;
        letter-spacing: 4px;
        color: #ff5a4f;
        text-shadow: 0 3px 14px #000;
      }
      #startmenu button,
      #humanchoice button {
        cursor: pointer;
        width: 300px;
        padding: 16px 20px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        background: #2c2230;
        border: 2px solid #ff5a4f;
        border-radius: 12px;
        transition:
          transform 0.1s ease,
          background 0.15s ease;
      }
      #startmenu button:hover,
      #humanchoice button:hover,
      #humanchoice button.focus {
        background: #4a2030;
        transform: scale(1.04);
        outline: 3px solid #ffd24a;
      }

      /* ---- human decision-boss choice overlay ---- */
      #humanchoice {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        text-align: center;
        pointer-events: auto;
        background: radial-gradient(circle at 50% 38%, #1a1410 0%, #0a0508 70%, #07060a 100%);
        color: #fff;
      }
      #humanchoice.show {
        display: flex;
      }
      #hc-setup {
        max-width: 640px;
        padding: 0 20px;
        font-size: 22px;
        line-height: 1.45;
        font-weight: 700;
        color: #ffeede;
        text-shadow: 0 2px 10px #000;
      }
      #humanchoice .hc-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        max-width: 740px;
      }
      #humanchoice button {
        width: 250px;
        font-size: 17px;
        letter-spacing: 1px;
        text-transform: none;
        border-color: #ffd24a;
      }
      #startmenu .hint {
        max-width: 440px;
        font-size: 14px;
        line-height: 1.5;
        color: #9a8a8a;
        letter-spacing: 1px;
      }

      /* ---- room-clear upgrade offer: pick 1 of 3 (B9b, ui/offer.js) ---- */
      #offer {
        position: fixed;
        inset: 0;
        z-index: 21;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        text-align: center;
        pointer-events: auto;
        background: radial-gradient(circle at 50% 38%, #120a1c 0%, #0a0508 70%, #07060a 100%);
        color: #fff;
      }
      #offer.show {
        display: flex;
      }
      #offer-title {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #ffd24a;
        text-shadow: 0 2px 12px #000;
      }
      #offer-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        justify-content: center;
        max-width: 820px;
      }
      .offer-card {
        position: relative;
        cursor: pointer;
        width: 230px;
        min-height: 158px;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #fff;
        background: #1a1320;
        border: 2px solid #9aa0a6;
        border-radius: 14px;
        transition:
          transform 0.1s ease,
          background 0.15s ease,
          box-shadow 0.15s ease;
      }
      .offer-card:hover,
      .offer-card.focus {
        background: #251a30;
        transform: translateY(-4px) scale(1.03);
        outline: 3px solid #ffd24a;
      }
      .offer-key {
        position: absolute;
        top: 8px;
        left: 11px;
        font-size: 14px;
        font-weight: 800;
        opacity: 0.55;
      }
      .offer-tier {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 2px;
        color: #c8ced4;
      }
      .offer-name {
        font-size: 21px;
        font-weight: 800;
        letter-spacing: 1px;
      }
      .offer-blurb {
        font-size: 15px;
        line-height: 1.35;
        color: #d8c8e8;
      }
      /* tier accents (common grey / rare blue / epic purple / ultra gold) */
      .offer-card.tier-rare {
        border-color: #4db3ff;
        box-shadow: 0 0 14px rgba(77, 179, 255, 0.25);
      }
      .offer-card.tier-rare .offer-tier {
        color: #8ac8ff;
      }
      .offer-card.tier-epic {
        border-color: #b06cff;
        box-shadow: 0 0 16px rgba(176, 108, 255, 0.3);
      }
      .offer-card.tier-epic .offer-tier {
        color: #d2b0ff;
      }
      .offer-card.tier-ultra {
        border-color: #ffcf3a;
        box-shadow: 0 0 22px rgba(255, 207, 58, 0.45);
      }
      .offer-card.tier-ultra .offer-tier {
        color: #ffe79a;
      }
      #offer-reroll {
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        color: #6cff8a;
        border: 1px solid #3a5a40;
        border-radius: 8px;
        padding: 8px 16px;
      }
      #offer-reroll:hover {
        color: #b6ffc8;
        border-color: #6cff8a;
      }
      #offer-controls {
        max-width: 480px;
        font-size: 13px;
        line-height: 1.5;
        color: #9a8a8a;
        letter-spacing: 1px;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-10px) scale(1.08);
        }
      }
      /* accessibility / feel settings panel (bottom-right; revealed once boot hides) */
      #settings {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 30;
        display: none; /* hidden over the boot splash; main.js adds .ready when it clears */
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(12, 8, 16, 0.55);
        border: 1px solid #3a2a40;
      }
      #settings.ready {
        display: flex;
      }
      #settings button {
        background: #1a1320;
        color: #e8d8ff;
        border: 1px solid #4a3a52;
        border-radius: 8px;
        font-size: 16px;
        line-height: 1;
        padding: 5px 8px;
        cursor: pointer;
      }
      #settings button:hover {
        border-color: #b06cff;
      }
      #settings button.on {
        border-color: #6cff8a;
        color: #6cff8a;
      }
      #settings input[type='range'] {
        width: 80px;
        accent-color: #b06cff;
        cursor: pointer;
      }

      /* ---- credits (music uses CC-BY tracks, credited in-game) ---- */
      #btn-credits {
        margin-top: 4px;
        cursor: pointer;
        background: transparent;
        color: #9a8a8a;
        border: 1px solid #4a3a52;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        letter-spacing: 1px;
      }
      #btn-credits:hover {
        color: #e8d8ff;
        border-color: #b06cff;
      }
      #credits {
        border: 0;
        padding: 0;
        background: transparent;
        color: #e8d8ff;
        max-width: 90vw;
      }
      #credits::backdrop {
        background: rgba(7, 6, 10, 0.82);
      }
      .credits-box {
        max-width: 560px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        padding: 22px 26px;
        background: #15101c;
        border: 2px solid #b06cff;
        border-radius: 14px;
        color: #e8d8ff;
        text-align: left;
      }
      .credits-box h2 {
        margin: 0 0 10px;
        color: #ff5a4f;
        letter-spacing: 2px;
      }
      .cr-note {
        font-size: 13px;
        line-height: 1.5;
        color: #c9b8b8;
      }
      .cr-list {
        margin: 10px 0;
        padding-left: 18px;
        font-size: 14px;
        line-height: 1.6;
      }
      .cr-slot {
        color: #6cff8a;
        font-weight: 700;
      }
      #credits-close {
        margin-top: 10px;
        cursor: pointer;
        background: #2c2230;
        color: #fff;
        border: 2px solid #ff5a4f;
        border-radius: 10px;
        padding: 10px 22px;
        font-weight: 800;
        letter-spacing: 1px;
      }
      #credits-close:hover {
        background: #4a2030;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="splatter"></div>
    <div id="screenflash"></div>

    <div id="hud">
      <div id="hearts"></div>
      <div id="lives"></div>
      <div id="hearts2"></div>
      <div id="room"></div>
      <div id="bossbars">
        <div class="bossbar" data-i="0">
          <div class="bossbar-name"></div>
          <div class="bossbar-track"><div class="bossbar-fill"></div></div>
        </div>
        <div class="bossbar" data-i="1">
          <div class="bossbar-name"></div>
          <div class="bossbar-track"><div class="bossbar-fill"></div></div>
        </div>
      </div>
      <div id="banner"></div>
      <div id="prompt"></div>
      <div id="toast"></div>
    </div>

    <div id="startmenu">
      <h1>🩸 City of Monsters</h1>
      <button id="btn1p">▶ 1 Player</button>
      <button id="btn2p">🎮 2 Players</button>
      <div class="hint">
        P1: WASD + mouse &nbsp;·&nbsp; P2: Xbox controller (left stick move, right stick aim, RT
        shoot) &nbsp;·&nbsp; click once for sound
      </div>
      <button id="btn-credits">♪ Credits</button>
    </div>

    <!-- credits panel (music uses CC-BY tracks — must be credited in-game) -->
    <dialog id="credits" aria-labelledby="credits-title">
      <div class="credits-box">
        <h2 id="credits-title">Credits</h2>
        <div id="credits-list"></div>
        <button id="credits-close">Close</button>
      </div>
    </dialog>

    <!-- human decision-boss: A/B/C/D approach choice (text set from config in ui/humanchoice.js) -->
    <div id="humanchoice">
      <div id="hc-setup"></div>
      <div class="hc-row">
        <button id="hc-A"></button>
        <button id="hc-B"></button>
        <button id="hc-C"></button>
        <button id="hc-D"></button>
      </div>
      <div class="hint">
        Pick how you approach — you won't know if it was the right call until you choose.
        &nbsp;·&nbsp; 1-4 / click / left-stick + A
      </div>
    </div>

    <!-- room-clear upgrade offer: pick 1 of 3 cards (built in ui/offer.js) -->
    <div id="offer">
      <div id="offer-title"></div>
      <div id="offer-cards"></div>
      <div id="offer-reroll"></div>
      <div id="offer-controls"></div>
    </div>

    <!-- accessibility / feel settings: volume, mute, hitbox overlay, effects (persisted) -->
    <div id="settings">
      <button id="set-mute" title="Mute (M)" aria-label="Mute">🔊</button>
      <input id="set-vol" type="range" min="0" max="1" step="0.05" aria-label="Volume" />
      <button id="set-hit" title="Show hitboxes (H)" aria-label="Show hitboxes">⊙</button>
      <button id="set-fx" title="Glow / effects" aria-label="Toggle glow effects">✨</button>
    </div>

    <div id="boot">
      <div class="skull">💀</div>
      <div class="title">City of Monsters</div>
      <div class="sub">loading&hellip;</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
