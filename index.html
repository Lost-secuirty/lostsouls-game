<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>City of Monsters</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07060a;
        overflow: hidden;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        cursor: crosshair;
      }
      #app {
        position: fixed;
        inset: 0;
        display: block;
      }
      #app canvas {
        display: block;
      }

      /* ---- HUD overlay (DOM on top of the WebGL canvas) ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 5;
        color: #fff;
        text-shadow: 0 2px 6px #000;
        user-select: none;
      }
      #hearts {
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 28px;
        letter-spacing: 2px;
      }
      #room {
        position: absolute;
        top: 16px;
        right: 18px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        opacity: 0.85;
      }
      #banner {
        position: absolute;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 52px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #banner.show {
        opacity: 1;
      }
      #prompt {
        position: absolute;
        bottom: 20%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #prompt.show {
        opacity: 1;
      }
      #toast {
        position: absolute;
        bottom: 12%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      #toast.show {
        opacity: 1;
      }

      /* blood splatter that fades over the whole screen */
      #splatter {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(150, 0, 0, 0.55) 0 3%, transparent 6%),
          radial-gradient(circle at 80% 60%, rgba(150, 0, 0, 0.55) 0 4%, transparent 7%),
          radial-gradient(circle at 60% 20%, rgba(120, 0, 0, 0.5) 0 2%, transparent 5%),
          radial-gradient(circle at 35% 80%, rgba(120, 0, 0, 0.5) 0 3%, transparent 6%);
        transition: opacity 0.4s ease;
      }

      /* loading splash shown until the game boots */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: radial-gradient(circle at 50% 40%, #2a0606 0%, #0a0508 70%, #07060a 100%);
        color: #ff5a4f;
        letter-spacing: 4px;
        font-weight: 800;
        text-transform: uppercase;
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      #boot.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot .title {
        font-size: 34px;
      }
      #boot .sub {
        font-size: 13px;
        color: #c9b8b8;
        letter-spacing: 2px;
      }
      .skull {
        font-size: 64px;
        animation: bob 1.1s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-10px) scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="splatter"></div>

    <div id="hud">
      <div id="hearts"></div>
      <div id="room"></div>
      <div id="banner"></div>
      <div id="prompt"></div>
      <div id="toast"></div>
    </div>

    <div id="boot">
      <div class="skull">💀</div>
      <div class="title">City of Monsters</div>
      <div class="sub">loading&hellip;</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
