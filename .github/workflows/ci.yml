name: CI

# Light gate: lint + unit tests + build on every push and PR.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
  schedule:
    - cron: "47 3 * * 6"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run test:proof
      - run: npm run test:coverage
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm run smoke:prod
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser smoke with trace
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat preview.log
              exit 1
            fi
            sleep 1
          done
          node scripts/browser-smoke.mjs
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lostsouls-game-smoke
          path: artifacts/playwright
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lostsouls-game-dist
          path: dist
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: lostsouls-game-coverage
          path: coverage
          if-no-files-found: error
          retention-days: 30
