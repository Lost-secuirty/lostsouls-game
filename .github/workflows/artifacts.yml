name: main-artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run test:proof
      - run: npm run test:coverage
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm run smoke:prod
      - name: Browser smoke
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat preview.log
              exit 1
            fi
            sleep 1
          done
          node scripts/browser-smoke.mjs
      - name: Package reproducible build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
            -czf release-artifacts/lostsouls-game-dist.tar.gz dist
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: release-artifacts/sbom.spdx.json
          upload-artifact: false
      - name: Generate checksums
        run: sha256sum release-artifacts/* > release-artifacts/SHA256SUMS
      - name: Submit SPDX dependencies
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: release-artifacts
      - name: Upload retained build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: lostsouls-main-${{ github.sha }}
          path: |
            release-artifacts
            coverage
            artifacts/playwright
          if-no-files-found: error
          retention-days: 30
