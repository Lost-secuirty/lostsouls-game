# SonarCloud Automatic Analysis configuration.
#
# CRITICAL: this project is analyzed by SonarCloud **Automatic Analysis** (the GitHub
# App — there is NO CI scanner step). Automatic Analysis reads ONLY this file and
# IGNORES `sonar-project.properties` entirely. It also reads the config from the
# repository's DEFAULT branch, so a change here must be merged to `main` before it
# affects a pull request's analysis (a PR branch's own copy is not used).
#   Docs: https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis
#
# Why these duplication exclusions (the 3% "duplicated lines on new code" gate is
# hostile to a small, content-growing game): what remains is DELIBERATE parallelism,
# not duplicated logic. Genuinely shared plumbing already lives in helpers.
#   - src/entities/bosses/**  each boss is a self-contained "card" (init/attacks/spawns
#                             read top-to-bottom on purpose); cross-boss structural echo
#                             is a readability choice, not a defect.
#   - src/config.js           single-source data tables (BOSS/WEAPONS/floors/META_UPGRADES);
#                             repeated stat-block shape is DATA, not duplicated logic.
#   - tests/**                tests legitimately repeat arrange/act/assert scaffolding.
# Duplication detection is the ONLY thing scoped out here — bugs, security, smells, and
# cognitive complexity still apply everywhere.
sonar.cpd.exclusions=src/entities/bosses/**,src/config.js,tests/**

# Coverage gate shouldn't demand tests on data/config/tests/tooling.
sonar.coverage.exclusions=tests/**,scripts/**,src/config.js,**/*.config.*
